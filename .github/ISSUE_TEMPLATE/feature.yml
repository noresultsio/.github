name: Feature
description: Product feature or meaningful user-facing functionality
title: "[Feature] "
body:
  - type: textarea
    id: summary
    attributes:
      label: Что делаем
      placeholder: Коротко опиши суть фичи
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Зачем
      description: Какую проблему решает фича и какой нужен результат
      placeholder: Почему это нужно
    validations:
      required: true

  - type: textarea
    id: done_if
    attributes:
      label: Готово, если
      placeholder: |
        - [ ] ...
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: textarea
    id: constraints
    attributes:
      label: Ограничения / зависимости
      placeholder: |
        - ...
        - ...
    validations:
      required: false

  - type: textarea
    id: links
    attributes:
      label: Ссылки
      placeholder: |
        - Design:
        - Spec:
    validations:
      required: false